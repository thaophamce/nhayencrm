name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install dependencies & Build web
        run: |
          cd frontend
          npm ci || npm install
          npm run build
          npx cap sync ios

      - name: Build iOS App (.app) & Package IPA
        run: |
          cd frontend/ios/App
          xcodebuild -project App.xcodeproj -scheme App -resolvePackageDependencies
          xcodebuild build -project App.xcodeproj -scheme App -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" CODE_SIGN_ENTITLEMENTS="" SYMROOT=build
          cd build/Release-iphoneos
          mkdir -p Payload
          cp -r App.app Payload/
          zip -r ZaloCRM-unsigned.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ZaloCRM-iOS-IPA
          path: frontend/ios/App/build/Release-iphoneos/ZaloCRM-unsigned.ipa
